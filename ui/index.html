<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Agent Executor | AI Orchestration System</title>
    <link rel="stylesheet" href="/ui/style.css?v=2">
</head>
<body>
    <div class="container">
        <!-- Main Content -->
        <main class="main">
            <!-- Welcome Screen (centered initially) -->
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-content">
                    <h1>Multi-Agent Executor</h1>
                    <div class="centered-input-container">
                        <div id="errorMessage" class="error-message" style="display: none;"></div>
                        <div class="chat-input-container">
                            <input type="text" class="chat-input" id="taskInput" placeholder="Ask anything..." autocomplete="off">
                            <button class="chat-send-btn" id="executeBtn">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Chat Interface (hidden initially) -->
            <section class="chat-section hidden" id="chatSection">
                <div class="chat-header">
                    <h2>Multi-Agent Executor</h2>
                    <button class="new-chat-btn" onclick="startNewChat()" title="Start new chat">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        New Chat
                    </button>
                </div>
                <div class="chat-messages" id="chatMessages">
                </div>
                <div class="chat-input-wrapper">
                    <div class="chat-input-container">
                        <input type="text" class="chat-input" id="chatInput" placeholder="Message..." autocomplete="off">
                        <button class="chat-send-btn" id="chatSendBtn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/ui/app.js?v=2"></script>
</body>
</html>
